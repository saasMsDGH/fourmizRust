name: CI - Quality Check

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache: true
          cache-dependency-path: gateway/go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/package-lock.json

      - name: Check Rust (Engine) Formatting
        run: cargo fmt --manifest-path engine/Cargo.toml --all -- --check
        
      - name: Validate Rust (Engine) Build
        run: cargo check --manifest-path engine/Cargo.toml

      - name: Validate Gateway (Go) Build
        working-directory: gateway
        run: go build -o /tmp/gate main.go

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Validate frontend build
        run: npm --prefix frontend run build

      - name: Docker dry run (Engine)
        run: docker build -f engine/Dockerfile ./engine

      - name: Docker dry run (Gateway)
        run: docker build -f gateway/Dockerfile ./gateway

      - name: Docker dry run (Frontend)
        run: docker build -f frontend/Dockerfile ./frontend
