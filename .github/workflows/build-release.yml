name: Build & Release (Tag Only)

on:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate release secrets
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          : "${DOCKER_USERNAME:?Set GitHub Actions secret DOCKER_USERNAME before tagging a release.}"
          : "${DOCKER_PASSWORD:?Set GitHub Actions secret DOCKER_PASSWORD before tagging a release.}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Engine (Rust)
        uses: docker/build-push-action@v6
        with:
          context: ./engine
          file: ./engine/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fourmiz-engine:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/fourmiz-engine:latest

      - name: Build & Push Gateway (Go)
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          file: ./gateway/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fourmiz-gateway:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/fourmiz-gateway:latest

      - name: Build & Push Frontend (React)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            APP_VERSION=v${{ steps.version.outputs.VERSION }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fourmiz-frontend:${{ steps.version.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/fourmiz-frontend:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Fourmiz v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
